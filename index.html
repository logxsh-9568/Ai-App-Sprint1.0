<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Event</title>

<style>
body{
margin:0;
font-family:Arial;
scroll-behavior:smooth;
}

/* FIRST PAGE */

.front{
height:100vh;
background:url('poster.jpg.jpg') no-repeat center center fixed;
background-size:cover;
position:relative;
}

.scroll-btn{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:10px 22px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

/* SECOND PAGE */

.second{
height:100vh;
background:white;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.second img{
max-width:700px;
width:90%;
height:auto;
margin-bottom:30px;
}

h2{
font-size:28px;
margin:10px 0;
color:#222;
}

h3{
font-size:24px;
margin:10px 0;
color:#444;
}
</style>
</head>

<body>

<!-- FIRST PAGE -->

<div class="front">
<button class="scroll-btn" onclick="document.getElementById('next').scrollIntoView()">Next</button>
</div>

<!-- SECOND PAGE -->

<div class="second" id="next">

<img src="college.jpg" alt="College Banner">

<h2>Department of CSE</h2>
<h3>(Artificial Intelligence and Machine Learning)</h3>

<h2>Intra Department App Contest 1.0</h2>

</div>

</body>
</html>
